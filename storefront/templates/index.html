<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Risk Scoring Platform</title>
</head>
<body>

<h1>Order Risk Scoring</h1>

<form method="POST">

    <p>
        <label>Transaction Amount</label><br>
        <input
            type="number"
            name="transaction_amount"
            step="0.01"
            required>
    </p>

    <p>
        <label>Quantity</label><br>
        <input
            type="number"
            name="quantity"
            required>
    </p>

    <p>
        <label>Customer Age</label><br>
        <input
            type="number"
            name="customer_age"
            required>
    </p>

    <p>
        <label>Account Age (Days)</label><br>
        <input
            type="number"
            name="account_age_days"
            required>
    </p>

    <p>
        <label>Payment Method</label><br>

        <select name="payment_method">

            <option value="Credit Card">Credit Card</option>

            <option value="Debit Card">Debit Card</option>

            <option value="Bank Transfer">Bank Transfer</option>

        </select>

    </p>

    <button type="submit">
        Predict Risk
    </button>

</form>

</body>
</html>
